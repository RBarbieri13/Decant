app = "decant-app"
primary_region = "ord"

[build]
dockerfile = "decant-standalone/Dockerfile"

[env]
DATABASE_PATH = "/data/decant.db"
NODE_ENV = "production"
PORT = "3000"

[[mounts]]
source = "decant_data"
destination = "/data"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0

[http_service.concurrency]
type = "requests"
hard_limit = 75
soft_limit = 50

[[http_service.checks]]
interval = "30s"
timeout = "5s"
grace_period = "10s"
method = "GET"
path = "/health/ready"
